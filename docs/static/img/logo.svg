<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c547;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c6923a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c6923a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a6528;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#goldGrad)" filter="url(#shadow)"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>

  <!-- Claw arm - vertical beam -->
  <rect x="95" y="28" width="10" height="50" rx="3" fill="#fff" opacity="0.95"/>

  <!-- Claw arm - horizontal support -->
  <rect x="70" y="72" width="60" height="8" rx="4" fill="#fff" opacity="0.95"/>

  <!-- Claw - left prong -->
  <path d="M78 80 Q72 100 65 115" stroke="#fff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.95"/>
  <path d="M65 115 Q62 120 67 122" stroke="#fff" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.95"/>

  <!-- Claw - right prong -->
  <path d="M122 80 Q128 100 135 115" stroke="#fff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.95"/>
  <path d="M135 115 Q138 120 133 122" stroke="#fff" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.95"/>

  <!-- Claw - center prong -->
  <path d="M100 80 Q100 105 100 118" stroke="#fff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.95"/>
  <path d="M100 118 Q100 123 100 124" stroke="#fff" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.95"/>

  <!-- Star (Genshin-like element) being grabbed -->
  <polygon points="100,130 103,140 113,140 105,146 108,156 100,150 92,156 95,146 87,140 97,140"
           fill="#fff" opacity="0.9"/>

  <!-- Bottom text area hint -->
  <text x="100" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700"
        font-size="14" fill="#fff" opacity="0.9" letter-spacing="2">GICLAW</text>
</svg>
